apis:
  - aid: tesla-energy:fleet-energy-api
    name: Tesla Fleet Energy API
    description: >-
      The energy_sites surface of the Tesla Fleet API. Provides OAuth-authenticated read access to Powerwall, Solar, and
      Megapack site state — site info, live status, calendar history, programs — and write access to backup reserve,
      operation mode, storm mode, time-of-use settings, and off-grid vehicle charging reserve. Requires
      energy_device_data (read) and energy_cmds (write) scopes.
    humanURL: https://developer.tesla.com/docs/fleet-api/endpoints/energy
